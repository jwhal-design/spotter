<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="SPOTTER — an unofficial, dependency-free study desk for the NCSF-CPT personal trainer exam. Summaries, flashcards, spaced repetition, quizzes, a timed simulator, scenarios, a crossword, and a prime-mover trainer.">
<meta name="color-scheme" content="light">
<title>SPOTTER // NCSF-CPT Prep</title>
<style>
/* ============================================================
   SPOTTER — design tokens
   Palette lifted from the brief: shock magenta, near-black,
   deep grape, pink-white paper, white card surfaces.
   ============================================================ */
:root{
  --ink:#0A0A0E;
  --shock:#EC2CB4;
  --shock-2:#FF5FD1;
  --grape:#7E2178;
  --paper:#FFF4FB;
  --card:#FFFFFF;
  --go:#0E9F6E;
  --stop:#E23A2E;
  --hair:#0A0A0E;
  --muted:#5B5560;
  --shadow:6px 6px 0 var(--ink);
  --shadow-sm:4px 4px 0 var(--ink);
  --shadow-xs:3px 3px 0 var(--ink);
  --bw:3px;                       /* signature border weight */
  --maxw:960px;
  --nav:250px;
  --disp: 900 clamp(2.1rem, 6vw, 4.6rem)/0.94 "Helvetica Neue", Arial, system-ui, sans-serif;
  --mono: ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace;
  --body: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

*,*::before,*::after{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0; background:var(--paper); color:var(--ink);
  font-family:var(--body); font-size:16px; line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{margin:0; line-height:1.05}
p{margin:0 0 .9em}
a{color:inherit}
img,svg{display:block; max-width:100%}
button{font-family:inherit}
:focus-visible{outline:var(--bw) solid var(--ink); outline-offset:2px}
::selection{background:var(--shock); color:var(--ink)}

/* utility ---------------------------------------------------- */
.eyebrow{font:700 .72rem/1 var(--mono); letter-spacing:.16em; text-transform:uppercase}
.display{font:var(--disp); text-transform:uppercase; letter-spacing:-.02em}
.lede{font-size:1.06rem; color:#2b2730; max-width:62ch}
.muted{color:var(--muted)}
.mono{font-family:var(--mono)}
.kbd{font:700 .8rem/1 var(--mono); border:2px solid var(--ink); border-radius:4px; padding:.15em .4em; background:var(--card); box-shadow:2px 2px 0 var(--ink)}
.sr{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
.hide{display:none !important}

/* ============================================================
   Layout: sidebar launcher + main stage
   ============================================================ */
.app{display:grid; grid-template-columns:var(--nav) 1fr; min-height:100vh}

.sidebar{
  position:sticky; top:0; align-self:start; height:100vh; overflow:auto;
  background:var(--ink); color:var(--paper);
  border-right:var(--bw) solid var(--ink);
  display:flex; flex-direction:column;
}
.brand{
  padding:22px 18px 16px; border-bottom:var(--bw) solid #2a2730;
  cursor:pointer; user-select:none;
}
.brand .mark{display:flex; align-items:center; gap:10px}
.brand .glyph{width:34px;height:34px;flex:0 0 auto; color:var(--shock)}
.brand .word{font:900 1.5rem/1 "Helvetica Neue",Arial,sans-serif; letter-spacing:.02em}
.brand .sub{margin-top:8px; font:700 .64rem/1.3 var(--mono); letter-spacing:.18em; color:var(--shock-2)}

.nav{padding:10px; display:flex; flex-direction:column; gap:4px; flex:1}
.navlink{
  display:flex; align-items:center; gap:11px; width:100%; text-align:left;
  background:transparent; color:var(--paper); border:2px solid transparent;
  padding:9px 11px; cursor:pointer; border-radius:2px;
  font:600 .92rem/1 var(--body); letter-spacing:.01em;
}
.navlink .ni{width:20px;height:20px;flex:0 0 auto; color:var(--shock-2)}
.navlink .nt{font:700 .58rem/1 var(--mono); letter-spacing:.1em; opacity:.55; margin-left:auto}
.navlink:hover{border-color:var(--shock); color:#fff}
.navlink[aria-current="page"]{background:var(--shock); color:var(--ink); border-color:var(--ink); box-shadow:3px 3px 0 #000}
.navlink[aria-current="page"] .ni{color:var(--ink)}
.navlink[aria-current="page"] .nt{opacity:.8}
.nav-foot{padding:12px 16px; border-top:var(--bw) solid #2a2730; font:600 .68rem/1.5 var(--mono); color:#8a8490}

.main{min-width:0; display:flex; flex-direction:column}
.stage{padding:30px clamp(16px,4vw,40px) 90px; margin:0 auto; width:100%; max-width:calc(var(--maxw) + 80px)}

/* mobile top bar (hidden on desktop) -------------------------- */
.topbar{
  display:none; position:sticky; top:0; z-index:40;
  align-items:center; gap:12px; padding:12px 14px;
  background:var(--ink); color:var(--paper); border-bottom:var(--bw) solid var(--ink);
}
.topbar .word{font:900 1.25rem/1 "Helvetica Neue",Arial,sans-serif}
.topbar .glyph{width:26px;height:26px;color:var(--shock)}
.burger{
  margin-left:auto; width:44px;height:40px; display:grid; place-items:center;
  background:var(--shock); color:var(--ink); border:2px solid var(--ink); box-shadow:3px 3px 0 #000;
  cursor:pointer; border-radius:2px;
}
.burger svg{width:22px;height:22px}
.backdrop{position:fixed; inset:0; background:rgba(10,10,14,.55); z-index:45; display:none}

/* ============================================================
   Signature: the WINDOW
   ============================================================ */
.window{
  background:var(--card); border:var(--bw) solid var(--ink);
  box-shadow:var(--shadow); border-radius:2px; margin-bottom:26px; overflow:hidden;
}
.win-bar{
  display:flex; align-items:center; gap:12px; padding:9px 14px;
  border-bottom:var(--bw) solid var(--ink); background:var(--paper);
}
.dots{display:flex; gap:7px; flex:0 0 auto}
.dots span{width:11px;height:11px;border:2px solid var(--ink); border-radius:50%; display:block}
.dots span:nth-child(1){background:var(--shock)}
.win-title{font:700 .74rem/1 var(--mono); letter-spacing:.12em; text-transform:uppercase}
.win-ico{margin-left:auto; width:20px;height:20px; color:var(--grape)}
.win-body{padding:22px}
@media (max-width:520px){ .win-body{padding:16px} }

/* hero window gets the loud treatment */
.window.loud{background:var(--shock); color:var(--ink); box-shadow:var(--shadow)}
.window.loud .win-bar{background:var(--ink); color:var(--paper); border-bottom-color:var(--ink)}
.window.loud .win-bar .dots span{border-color:var(--paper)}
.window.loud .win-bar .dots span:nth-child(1){background:var(--paper)}
.window.loud .win-ico{color:var(--ink)}
.window.grape{background:var(--grape); color:#fff}
.window.grape .win-bar{background:var(--ink); color:#fff}
.window.grape .win-ico{color:var(--shock-2)}
.window.ink{background:var(--ink); color:var(--paper)}
.window.ink .win-bar{background:var(--grape)}

/* ============================================================
   Buttons + chips
   ============================================================ */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  font:800 .9rem/1 var(--body); letter-spacing:.01em; cursor:pointer;
  padding:12px 18px; background:var(--card); color:var(--ink);
  border:var(--bw) solid var(--ink); box-shadow:var(--shadow-sm); border-radius:2px;
  transition:transform .06s ease, box-shadow .06s ease;
}
.btn:hover{transform:translate(-1px,-1px); box-shadow:5px 5px 0 var(--ink)}
.btn:active{transform:translate(4px,4px); box-shadow:0 0 0 var(--ink)}
.btn.solid{background:var(--shock); color:var(--ink)}
.btn.ink{background:var(--ink); color:var(--paper)}
.btn.ghost{box-shadow:none; background:transparent}
.btn.sm{padding:8px 12px; font-size:.8rem; box-shadow:var(--shadow-xs)}
.btn.block{width:100%}
.btn[disabled]{opacity:.4; cursor:not-allowed; transform:none; box-shadow:var(--shadow-sm)}
.btn-row{display:flex; flex-wrap:wrap; gap:12px}

.tag{display:inline-flex; align-items:center; gap:6px; font:700 .66rem/1 var(--mono); letter-spacing:.08em; text-transform:uppercase; padding:6px 9px; border:2px solid var(--ink); border-radius:2px; background:var(--card)}
.tag.fill{background:var(--ink); color:var(--paper)}
.tag.pink{background:var(--shock); color:var(--ink)}
.chip{display:inline-flex; align-items:center; gap:7px; font:800 .74rem/1 var(--mono); letter-spacing:.06em; padding:7px 11px; border:2px solid var(--ink); border-radius:2px; text-transform:uppercase}
.chip.go{background:var(--go); color:#fff}
.chip.stop{background:var(--stop); color:#fff}

/* stat row (hero vitals) ------------------------------------- */
.stats{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-top:20px}
.stat{border:var(--bw) solid var(--ink); background:var(--card); color:var(--ink); padding:14px; border-radius:2px; box-shadow:var(--shadow-xs)}
.stat .n{font:900 1.8rem/1 "Helvetica Neue",Arial,sans-serif}
.stat .l{font:700 .6rem/1.2 var(--mono); letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-top:6px}
@media (max-width:640px){ .stats{grid-template-columns:repeat(2,1fr)} }

/* launcher grid (dashboard tiles) ---------------------------- */
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:16px}
.tile{
  text-align:left; cursor:pointer; background:var(--card); color:var(--ink);
  border:var(--bw) solid var(--ink); box-shadow:var(--shadow-sm); border-radius:2px;
  padding:16px; display:flex; flex-direction:column; gap:10px; min-height:132px;
  transition:transform .07s ease, box-shadow .07s ease;
}
.tile:hover{transform:translate(-2px,-2px); box-shadow:8px 8px 0 var(--ink)}
.tile:active{transform:translate(3px,3px); box-shadow:1px 1px 0 var(--ink)}
.tile .ti{width:30px;height:30px;color:var(--shock)}
.tile .tt{font:900 1.05rem/1.05 "Helvetica Neue",Arial,sans-serif; text-transform:uppercase; letter-spacing:-.01em}
.tile .td{font-size:.86rem; color:var(--muted); line-height:1.45}
.tile .badge{margin-top:auto; align-self:flex-start; font:800 .62rem/1 var(--mono); letter-spacing:.08em; text-transform:uppercase; background:var(--shock); color:var(--ink); border:2px solid var(--ink); padding:5px 8px; border-radius:2px}

/* section headers -------------------------------------------- */
.head{margin-bottom:22px}
.head .eyebrow{color:var(--grape); margin-bottom:10px}
.head h1{font:var(--disp); text-transform:uppercase; letter-spacing:-.02em; margin-bottom:12px}
.head .lede{color:#2b2730}

/* pill selector (domain filters) ----------------------------- */
.pills{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px}
.pill{font:700 .76rem/1 var(--body); padding:8px 12px; border:2px solid var(--ink); background:var(--card); color:var(--ink); cursor:pointer; border-radius:2px; box-shadow:var(--shadow-xs)}
.pill:hover{background:var(--paper)}
.pill[aria-pressed="true"]{background:var(--ink); color:var(--paper)}

/* prose (summaries / about) ---------------------------------- */
.prose{max-width:66ch}
.prose h3{font:800 1.15rem/1.2 var(--body); margin:1.4em 0 .5em}
.prose ul{margin:.4em 0 1em; padding-left:1.1em}
.prose li{margin:.3em 0}
.prose .callout{border-left:6px solid var(--shock); background:var(--paper); padding:12px 16px; margin:1em 0; border-radius:0 4px 4px 0}
.prose .callout .eyebrow{color:var(--grape); display:block; margin-bottom:6px}

/* flashcards ------------------------------------------------- */
.flip{perspective:1400px; margin:0 auto; max-width:560px}
.flip-inner{position:relative; width:100%; min-height:280px; transform-style:preserve-3d; transition:transform .5s cubic-bezier(.2,.7,.2,1); cursor:pointer}
.flip.on .flip-inner{transform:rotateY(180deg)}
.face{position:absolute; inset:0; backface-visibility:hidden; border:var(--bw) solid var(--ink); border-radius:2px; padding:26px; display:flex; flex-direction:column; justify-content:center; box-shadow:var(--shadow)}
.face.front{background:var(--card)}
.face.back{background:var(--grape); color:#fff; transform:rotateY(180deg)}
.face .kind{font:700 .64rem/1 var(--mono); letter-spacing:.14em; text-transform:uppercase; opacity:.7; margin-bottom:12px}
.face .q{font:800 1.35rem/1.25 var(--body)}
.face .a{font-size:1.06rem; line-height:1.5}
.face .hint{margin-top:auto; padding-top:14px; font:700 .66rem/1 var(--mono); letter-spacing:.08em; opacity:.6; text-transform:uppercase}
.deck-meta{display:flex; align-items:center; justify-content:space-between; margin:16px auto 0; max-width:560px; font:700 .8rem/1 var(--mono)}

/* quiz + scenarios ------------------------------------------- */
.q-stem{font:800 1.16rem/1.35 var(--body); margin-bottom:16px}
.choices{display:flex; flex-direction:column; gap:10px; margin-bottom:8px}
.choice{
  display:flex; gap:12px; align-items:flex-start; text-align:left; width:100%;
  background:var(--card); border:var(--bw) solid var(--ink); border-radius:2px;
  padding:13px 15px; cursor:pointer; box-shadow:var(--shadow-xs); font-size:.98rem; line-height:1.4;
  transition:transform .06s ease;
}
.choice:hover:not(:disabled){transform:translateX(3px)}
.choice .letter{font:900 .95rem/1 var(--mono); flex:0 0 auto; width:26px;height:26px; display:grid; place-items:center; border:2px solid var(--ink); border-radius:50%}
.choice[data-state="right"]{background:var(--go); color:#fff}
.choice[data-state="right"] .letter{border-color:#fff}
.choice[data-state="wrong"]{background:var(--stop); color:#fff}
.choice[data-state="wrong"] .letter{border-color:#fff}
.choice[data-state="dim"]{opacity:.55}
.choice:disabled{cursor:default}
.explain{border:var(--bw) solid var(--ink); border-radius:2px; padding:14px 16px; margin-top:14px; background:var(--paper)}
.explain .eyebrow{color:var(--grape); display:block; margin-bottom:6px}
.progress-line{display:flex; align-items:center; gap:12px; margin-bottom:16px; font:700 .8rem/1 var(--mono)}
.bar-track{flex:1; height:12px; border:2px solid var(--ink); border-radius:99px; overflow:hidden; background:var(--card)}
.bar-fill{height:100%; background:var(--shock); width:0%}

/* terms ------------------------------------------------------ */
.search{width:100%; font:600 1rem/1 var(--body); padding:13px 15px; border:var(--bw) solid var(--ink); border-radius:2px; box-shadow:var(--shadow-xs); background:var(--card)}
.term{border-bottom:2px solid #e7d8e6; padding:14px 2px}
.term:last-child{border-bottom:0}
.term .t{font:800 1.02rem/1.2 var(--body)}
.term .t .badge{font:700 .58rem/1 var(--mono); letter-spacing:.08em; text-transform:uppercase; margin-left:8px; color:var(--grape); border:2px solid var(--grape); padding:3px 6px; border-radius:2px; vertical-align:middle}
.term .d{color:#2b2730; margin-top:5px; font-size:.96rem}

/* SRS -------------------------------------------------------- */
.boxes{display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-bottom:20px}
.lbox{border:var(--bw) solid var(--ink); border-radius:2px; padding:12px 8px; text-align:center; background:var(--card); box-shadow:var(--shadow-xs)}
.lbox .n{font:900 1.5rem/1 "Helvetica Neue",Arial,sans-serif}
.lbox .l{font:700 .56rem/1.2 var(--mono); letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin-top:5px}
.lbox.due{background:var(--shock)}
.rate-row{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px}

/* exam simulator --------------------------------------------- */
.exam-top{display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:16px}
.timer{font:900 1.5rem/1 var(--mono); letter-spacing:.04em; border:var(--bw) solid var(--ink); padding:8px 14px; border-radius:2px; background:var(--ink); color:var(--paper)}
.timer.warn{background:var(--stop); color:#fff; animation:pulse 1s steps(2) infinite}
@keyframes pulse{50%{opacity:.55}}
.qnav{display:flex; flex-wrap:wrap; gap:6px; margin:16px 0}
.qdot{width:34px;height:34px; border:2px solid var(--ink); border-radius:2px; font:800 .8rem/1 var(--mono); cursor:pointer; background:var(--card); display:grid; place-items:center}
.qdot[data-s="answered"]{background:var(--ink); color:var(--paper)}
.qdot[data-s="current"]{background:var(--shock); color:var(--ink); box-shadow:2px 2px 0 var(--ink)}
.qdot[data-s="flagged"]{background:var(--grape); color:#fff}
.result-score{font:900 clamp(3rem,12vw,5.5rem)/0.9 "Helvetica Neue",Arial,sans-serif}
.dbar{display:flex; align-items:center; gap:10px; margin:9px 0; font:700 .78rem/1 var(--mono)}
.dbar .track{flex:1; height:16px; border:2px solid var(--ink); border-radius:2px; overflow:hidden; background:var(--card)}
.dbar .fill{height:100%; background:var(--grape)}
.dbar .lab{width:44%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}

/* prime-mover matcher ---------------------------------------- */
.match{display:grid; grid-template-columns:1fr 1fr; gap:12px}
.mcol{display:flex; flex-direction:column; gap:10px}
.mtok{text-align:left; padding:13px 14px; border:var(--bw) solid var(--ink); border-radius:2px; background:var(--card); cursor:pointer; box-shadow:var(--shadow-xs); font:700 .95rem/1.25 var(--body)}
.mtok:hover:not(:disabled){transform:translateX(3px)}
.mtok[data-s="sel"]{background:var(--shock); color:var(--ink)}
.mtok[data-s="done"]{background:var(--go); color:#fff; cursor:default}
.mtok[data-s="miss"]{background:var(--stop); color:#fff; animation:shake .3s}
.mtok:disabled{cursor:default}
@keyframes shake{25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.mcol .colhead{font:700 .62rem/1 var(--mono); letter-spacing:.12em; text-transform:uppercase; color:var(--grape); margin-bottom:2px}

/* crossword -------------------------------------------------- */
.xw-wrap{display:flex; flex-direction:column; gap:20px}
.xw-scroll{overflow:auto; padding-bottom:6px}
.xw-grid{display:grid; gap:0; width:max-content; border:var(--bw) solid var(--ink); background:var(--ink)}
.xw-cell{position:relative; width:34px;height:34px; background:var(--card); border:1px solid #c9b9c8}
.xw-cell.void{background:var(--ink); border-color:var(--ink)}
.xw-cell input{width:100%;height:100%; border:0; text-align:center; text-transform:uppercase; font:800 1rem/1 var(--body); background:transparent; color:var(--ink); padding:0}
.xw-cell input:focus{background:var(--shock); outline:2px solid var(--ink); outline-offset:-2px}
.xw-cell.ok input{background:var(--go); color:#fff}
.xw-cell.bad input{background:#ffd9d6}
.xw-num{position:absolute; top:1px; left:2px; font:700 .52rem/1 var(--mono)}
.clues{display:grid; grid-template-columns:1fr 1fr; gap:22px}
.clues h4{font:800 .9rem/1 var(--mono); letter-spacing:.1em; text-transform:uppercase; color:var(--grape); margin-bottom:10px; padding-bottom:6px; border-bottom:2px solid var(--ink)}
.clues ol{margin:0; padding:0; list-style:none; display:flex; flex-direction:column; gap:8px}
.clues li{font-size:.9rem; line-height:1.35; display:flex; gap:8px}
.clues li b{font-family:var(--mono); flex:0 0 auto}
@media (max-width:560px){ .clues{grid-template-columns:1fr} .xw-cell{width:30px;height:30px} }

/* checklist (study guides) ----------------------------------- */
.check{display:flex; gap:12px; align-items:flex-start; padding:9px 0; border-bottom:2px solid #efe1ee; cursor:pointer}
.check:last-child{border-bottom:0}
.check input{appearance:none; flex:0 0 auto; width:24px;height:24px; border:var(--bw) solid var(--ink); border-radius:2px; cursor:pointer; margin-top:1px; background:var(--card); position:relative}
.check input:checked{background:var(--shock)}
.check input:checked::after{content:"✓"; position:absolute; inset:0; display:grid; place-items:center; font-weight:900; color:var(--ink)}
.check span{line-height:1.45}
.check input:checked + span{opacity:.5; text-decoration:line-through}
.guide-sec{margin-bottom:22px}
.guide-sec h3{font:800 1.05rem/1.2 var(--body); margin-bottom:8px; display:flex; align-items:center; gap:8px}
.hy{background:var(--paper); border:var(--bw) solid var(--ink); border-radius:2px; padding:14px 16px; margin:14px 0}
.hy .eyebrow{color:var(--stop); display:block; margin-bottom:8px}
.hy ul{margin:0; padding-left:1.1em}

/* toast + easter egg ----------------------------------------- */
.toast{position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px); opacity:0; background:var(--ink); color:var(--paper); border:var(--bw) solid var(--shock); box-shadow:6px 6px 0 var(--shock); padding:13px 18px; border-radius:2px; font:700 .85rem/1.3 var(--body); z-index:80; max-width:90vw; transition:opacity .25s, transform .25s; pointer-events:none}
.toast.on{opacity:1; transform:translateX(-50%) translateY(0)}
body.maxeffort{animation:tilt .18s steps(2) 6}
@keyframes tilt{50%{transform:rotate(.4deg)}}

/* empty states ----------------------------------------------- */
.empty{text-align:center; padding:34px 18px; color:var(--muted)}
.empty .ei{width:54px;height:54px;margin:0 auto 14px; color:var(--shock)}
.empty h3{font:900 1.2rem/1.1 "Helvetica Neue",Arial,sans-serif; text-transform:uppercase; color:var(--ink); margin-bottom:8px}

/* responsive ------------------------------------------------- */
@media (max-width:860px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed; z-index:50; width:min(84vw,320px); left:0; top:0; transform:translateX(-102%); transition:transform .25s ease}
  body.nav-open .sidebar{transform:translateX(0)}
  body.nav-open .backdrop{display:block}
  .topbar{display:flex}
  .stage{padding-top:22px}
}
@media print{
  .sidebar,.topbar,.backdrop,.win-bar,.btn,.pills,.nav-foot{display:none !important}
  .app{display:block}
  body{background:#fff}
  .window{box-shadow:none; border:2px solid #000; break-inside:avoid}
}
@media (prefers-reduced-motion:reduce){

{
  id:"anatomy", code:"D1", name:"Functional Anatomy & Physiology", short:"Anatomy & Physiology", icon:"splat",
  blurb:"How the body is built and how it powers movement.",
  summary:`<p>Everything a trainer programs runs through the musculoskeletal system: bones act as levers, joints as fulcrums, and skeletal muscle as the motor that pulls bone across joint. Muscle attaches by tendon, contracts, and produces force. It only ever pulls, never pushes, which is why muscles work in pairs around a joint.</p>
  <h3>Muscle actions and roles</h3>
  <p>A single muscle can play different roles depending on the movement. The <b>agonist</b> is the prime mover producing the action. The <b>antagonist</b> opposes it and controls the return. <b>Synergists</b> assist, and <b>stabilizers</b> (fixators) hold a joint steady so the prime mover can work. Contractions come in three flavors: <b>concentric</b> (muscle shortens under load, the lifting phase), <b>eccentric</b> (muscle lengthens under load, the lowering phase, where most soreness is generated), and <b>isometric</b> (tension with no length change, like a plank).</p>
  <div class="callout"><span class="eyebrow">Sliding filament, briefly</span>Force is produced when myosin heads form cross-bridges on actin and pull. Calcium exposes the binding sites, and ATP is required to release each cross-bridge so the cycle can repeat. No ATP, no release, which is one reason rigor sets in without it.</div>
  <h3>Fiber types</h3>
  <p>Type I fibers are slow-twitch, fatigue-resistant, and built for endurance. Type IIa are fast and moderately fatigue-resistant. Type IIx are the fastest and most powerful but tire quickly. Training shifts capacity within these types, and the ratio a person is born with sets part of the ceiling for endurance versus power.</p>
  <h3>Systems that keep it running</h3>
  <p>The nervous system fires motor units, a motor neuron plus every fiber it controls, and recruits them by size, smallest first. The cardiorespiratory system delivers oxygen: cardiac output equals heart rate times stroke volume, and it climbs with intensity. The endocrine system tunes the response through hormones, testosterone and growth hormone driving repair and growth, cortisol mobilizing energy under stress, and insulin shuttling glucose into cells.</p>
  <h3>Energy systems</h3>
  <p>Three systems supply ATP on overlapping timelines. The <b>phosphagen (ATP-PC)</b> system fuels all-out efforts of roughly ten seconds using stored ATP and creatine phosphate, no oxygen needed. The <b>glycolytic</b> system covers hard efforts from about ten seconds to two minutes by breaking down glucose, producing lactate. The <b>oxidative</b> system handles anything longer, using carbohydrate and fat with oxygen. They all run at once; the mix just shifts with duration and intensity.</p>`,

{
  id:"biomech", code:"D2", name:"Biomechanics & Kinesiology", short:"Biomechanics", icon:"cursor",
  blurb:"Planes, levers, and reading a movement.",
  summary:`<p>Biomechanics is how a trainer analyzes and describes movement precisely. It starts with three planes, each with its own motions.</p>
  <h3>Planes and their motions</h3>
  <ul>
    <li><b>Sagittal</b> plane splits the body left and right. It owns flexion and extension. Think biceps curl, squat, walking forward.</li>
    <li><b>Frontal</b> plane splits front and back. It owns abduction, adduction, and lateral flexion. Think side lateral raise, jumping jack.</li>
    <li><b>Transverse</b> plane splits top and bottom. It owns rotation and horizontal ab/adduction. Think a cable chop or a swinging bat.</li>
  </ul>
  <div class="callout"><span class="eyebrow">Axis pairing (the classic trap)</span>Motion in a plane spins around the axis running perpendicular to it: sagittal motion around a mediolateral axis, frontal around an anteroposterior axis, transverse around a longitudinal axis.</div>
  <h3>Levers</h3>
  <p>Bones and joints form levers. What sits in the middle defines the class. In a <b>first-class</b> lever the fulcrum is in the middle (triceps extending the elbow, the head nodding). In a <b>second-class</b> lever the resistance is in the middle (a standing calf raise). In a <b>third-class</b> lever the effort is in the middle (a biceps curl), and this is by far the most common arrangement in the human body. Third-class levers trade force for speed and range of motion.</p>
  <h3>Reading a rep</h3>
  <p>To analyze any exercise, name the joint, the action at that joint, and the plane it happens in, then identify the prime mover. During the lowering phase the same prime mover usually works eccentrically to control the load against gravity. Force applied at a distance from a joint creates torque, which is why a longer lever arm makes the same weight feel heavier.</p>`,
  guide:[
    {h:"Planes", points:[
      "Sagittal: flexion / extension (curls, squats)",
      "Frontal: abduction / adduction / lateral flexion (lateral raise)",
      "Transverse: rotation / horizontal ab-adduction (cable chop, bench press movement)",
      "The axis is always perpendicular to the plane of motion"]},
    {h:"Levers", points:[
      "First class = fulcrum in the middle (triceps at the elbow)",
      "Second class = resistance in the middle (calf raise)",
      "Third class = effort in the middle, most common in the body (biceps curl)"]},
    {h:"Movement analysis", points:[
      "Name the joint, the action, the plane, then the prime mover",
      "The lowering phase is usually the same muscle working eccentrically",
      "Torque rises with the length of the lever arm"]}
  ],
  highYield:["Given an exercise, pick the correct plane and prime mover.","Third-class levers are the most common; know the calf-raise exception (second class).","Do not swap the plane with its axis."],
  mnemonic:{name:"Lever order 1-2-3", text:"The middle component goes Fulcrum, Resistance, Effort. First = Fulcrum, second = Resistance, third = Effort. 'FRE.'"}

{
  id:"nutrition", code:"D3", name:"Nutrition", short:"Nutrition", icon:"globe",
  blurb:"Macros, energy balance, and staying in your lane.",
  summary:`<p>Test-takers consistently report more nutrition than they expected, so treat it as a major domain rather than an afterthought.</p>
  <h3>The macronutrients</h3>
  <p>Three macros supply energy: carbohydrate at 4 kcal per gram, protein at 4, and fat at 9. Alcohol, not a nutrient the body needs, still carries 7 kcal per gram. Carbohydrate is the preferred fuel for higher-intensity work and refills muscle glycogen. Protein supplies amino acids for repair and growth; general needs sit near 0.8 g/kg, while active people trend higher, roughly 1.2 to 2.0 g/kg depending on training. Fat is essential for hormones, cell membranes, and fat-soluble vitamin absorption.</p>
  <div class="callout"><span class="eyebrow">Energy balance</span>Weight change follows energy in versus energy out. A deficit drives loss, a surplus drives gain. Total daily energy expenditure is basal metabolic rate plus the thermic effect of food plus activity, and BMR is the largest slice for most people.</div>
  <h3>The details clients ask about</h3>
  <p>Glycemic index ranks how quickly a carbohydrate raises blood glucose; lower-GI choices give steadier energy. Hydration matters because even mild dehydration hurts performance, so fluids go before, during, and after training. Micronutrients, the vitamins and minerals, do not supply energy but run the machinery, and iron, calcium, and vitamin D are common shortfalls. Nutrient timing has a role for athletes, with carbohydrate and protein after hard sessions aiding recovery, though total daily intake matters more than the clock for most clients.</p>
  <h3>Where the line is</h3>
  <p>A CPT teaches general healthy-eating guidance and the science above. Building individualized meal plans, prescribing diets for a medical condition, or diagnosing a nutrient deficiency belongs to a registered dietitian. Knowing that boundary is itself tested.</p>`,
  guide:[
    {h:"Energy math", points:[
      "Carbohydrate 4, protein 4, fat 9, alcohol 7 kcal per gram",
      "Deficit loses weight, surplus gains it",
      "TDEE = BMR + thermic effect of food + activity; BMR is the biggest piece"]},
    {h:"The macros in practice", points:[
      "Carbohydrate fuels intensity and refills glycogen",
      "Protein ~0.8 g/kg general, ~1.2 to 2.0 g/kg for active people",
      "Fat is essential for hormones and fat-soluble vitamin absorption",
      "Fluids before, during, and after training"]},
    {h:"Scope of practice", points:[
      "Teach general guidance and the science",
      "Do not write individualized meal plans or clinical diets",
      "Refer medical nutrition needs to a registered dietitian"]}
  ],
  highYield:["Memorize 4-4-9 and the 7 for alcohol.","Energy balance beats any single food rule for weight change.","Meal plans and clinical diets are outside CPT scope."],
  mnemonic:{name:"Calories per gram", text:"'4, 4, 9, and booze is 7.' Carbs and protein 4, fat 9, alcohol 7."}
},
{
  id:"assessment", code:"D4", name:"Health & Fitness Assessment", short:"Assessment", icon:"sparkle",
  blurb:"Screen first, measure smart, order it right.",
  summary:`<p>Assessment protects the client and gives you a baseline to program from. It starts before any exercise.</p>
  <h3>Screen before you sweat</h3>
  <p>Preparticipation screening identifies who needs medical clearance before starting. A common tool is the PAR-Q+, a short self-report questionnaire. Broader models look at current activity level, known cardiovascular, metabolic, or renal disease, and any signs or symptoms of disease to decide whether physician clearance is warranted. When in doubt, refer for clearance.</p>
  <h3>Vital signs and body composition</h3>
  <p>Resting heart rate and blood pressure are quick health markers. For blood pressure, current guidelines flag 120 to 129 over under 80 as elevated and 130 over 80 and up as hypertension, though some older materials still use higher cutoffs, so confirm which set your exam uses. Rating of perceived exertion, on the 6 to 20 Borg scale or the 0 to 10 scale, lets clients self-report intensity. Body composition can be estimated by BMI (a screening ratio, not a body-fat measure), skinfold calipers, circumference measurements, and waist-to-hip ratio for fat-distribution risk.</p>
  <div class="callout"><span class="eyebrow">Order matters</span>Sequence assessments so earlier ones do not skew later ones. Take resting measures first, then body composition, then cardiorespiratory testing, then muscular fitness, and flexibility last, so fatigue does not distort the numbers.</div>
  <h3>Fitness tests</h3>
  <p>Cardiorespiratory fitness is captured by VO2 max in mL/kg/min, estimated through submaximal tests like the YMCA step test, the Rockport walk, or a 1.5-mile run. Muscular strength shows up as a one-rep max or a predicted max from a submaximal set; muscular endurance through tests like the push-up or curl-up. Flexibility is often screened with the sit-and-reach.</p>`,
  guide:[
    {h:"Screening", points:[
      "PAR-Q+ is a common self-report screen",
      "Consider current activity, known disease, and signs or symptoms",
      "When uncertain, refer for physician clearance"]},
    {h:"Measures", points:[
      "Elevated BP starts around 120 to 129 / under 80 (verify your exam's cutoffs)",
      "RPE uses the 6 to 20 Borg scale or the 0 to 10 scale",
      "BMI screens weight-for-height; it is not a body-fat measure",
      "Waist-to-hip ratio flags fat-distribution risk"]},
    {h:"Test order", points:[
      "Resting first, then body composition",
      "Cardiorespiratory before muscular fitness",
      "Flexibility last so fatigue does not skew it",
      "VO2 max is expressed in mL/kg/min"]}
  ],
  highYield:["Know the assessment order and why flexibility goes last.","BMI is a screen, not a fat measurement.","Refer for clearance when screening raises a flag."],
  mnemonic:{name:"Assessment order", text:"Rest, Body, Cardio, Muscle, Stretch. 'Really Big Cats Move Slow.'"}

{
  id:"programming", code:"D5", name:"Exercise Programming", short:"Programming", icon:"splat",
  blurb:"Principles, acute variables, and periodization.",
  summary:`<p>Program design turns goals into a repeatable plan grounded in a few durable principles.</p>
  <h3>Training principles</h3>
  <p><b>Overload</b> means the body must be challenged beyond its habit to adapt. <b>Progression</b> means that challenge increases over time. <b>Specificity</b>, the SAID principle (specific adaptation to imposed demands), means you get better at what you train. <b>Reversibility</b> means fitness fades when training stops. <b>Individuality</b> means people respond differently. Selye's general adaptation syndrome frames the response as alarm, resistance, then exhaustion if recovery never comes.</p>
  <div class="callout"><span class="eyebrow">FITT, then FITT-VP</span>Frequency, Intensity, Time, and Type describe any program. Adding Volume and Progression turns it into a plan that keeps working past week three.</div>
  <h3>Acute variables and the load continuum</h3>
  <p>Reps, sets, load, rest, and tempo are the dials. Load and reps sit on a continuum. Strength and power use heavy loads (about 85 percent of a one-rep max and up) for low reps with long rest of two to five minutes. Hypertrophy uses moderate loads (roughly 67 to 85 percent) for 6 to 12 reps with shorter rest. Muscular endurance uses lighter loads for 12-plus reps with brief rest. Training systems layer on top: circuits keep rest short, supersets pair exercises, drop sets extend a set, pyramids ramp load, and split routines divide the week by body part or movement.</p>
  <h3>Periodization and cardio</h3>
  <p>Periodization organizes training across time into a macrocycle (the big block, often a year), mesocycles (weeks to months), and microcycles (usually a week). Linear periodization shifts gradually from high volume toward high intensity; undulating periodization varies the stimulus within a week. On the cardio side, the Karvonen method sets target heart rate from heart-rate reserve: subtract resting from maximum heart rate, take a percentage, then add resting back. Estimated max is often 220 minus age, a rough figure. Warm up first, place the most demanding or technical work early, and cool down at the end.</p>`,
  guide:[
    {h:"Principles", points:[
      "Overload, then progressive overload over time",
      "Specificity (SAID): you adapt to what you impose",
      "Reversibility: stop training and it fades",
      "GAS: alarm, resistance, exhaustion"]},
    {h:"Acute variables", points:[
      "Strength/power: ~85%+ 1RM, low reps, 2 to 5 min rest",
      "Hypertrophy: ~67 to 85%, 6 to 12 reps, moderate rest",
      "Endurance: lighter load, 12+ reps, short rest",
      "Systems: circuit, superset, drop set, pyramid, split"]},
    {h:"Periodization & cardio", points:[
      "Macrocycle > mesocycle > microcycle",
      "Linear ramps volume to intensity; undulating varies within the week",
      "Karvonen: ((HRmax - HRrest) x %) + HRrest",
      "Warm up, hardest work early, cool down"]}
  ],
  highYield:["Match load and reps to the goal on the continuum.","Karvonen adds resting HR back at the end; do not forget it.","Order a session: warm-up, power/skill, strength, then conditioning."],
  mnemonic:{name:"Program checklist", text:"FITT: Frequency, Intensity, Time, Type. Add Volume and Progression so it keeps working."}
},
{
  id:"special", code:"D6", name:"Special Populations & Flexibility", short:"Special Pops", icon:"globe",
  blurb:"Sensible modifications and stretching that fits.",
  summary:`<p>Most clients bring something to work around. The theme across every group is the same: screen, start conservative, progress slowly, and refer anything medical.</p>
  <h3>Common populations</h3>
  <ul>
    <li><b>Older adults</b>: prioritize balance, functional strength, and joint-friendly ranges; expect slower progression.</li>
    <li><b>Youth</b>: focus on skill, technique, and fun; resistance training is safe with good coaching and appropriate loads.</li>
    <li><b>Pregnancy</b>: generally continue activity with clearance; avoid supine positions later in pregnancy, avoid overheating, and skip high fall-risk work.</li>
    <li><b>Hypertension</b>: emphasize steady aerobic work, avoid the Valsalva maneuver and heavy isometrics that spike pressure.</li>
    <li><b>Type 2 diabetes</b>: exercise improves glucose control; watch for hypoglycemia, especially with insulin, and check that clients have fuel on hand.</li>
    <li><b>Arthritis and osteoporosis</b>: choose low-impact, pain-free ranges; for osteoporosis, favor weight-bearing loading and avoid loaded spinal flexion.</li>
  </ul>
  <div class="callout"><span class="eyebrow">The trainer's job</span>You modify exercise and monitor response. You do not treat the condition. Clearance and medical questions go back to the physician.</div>
  <h3>Flexibility training</h3>
  <p>Four methods, each with a place. <b>Static</b> stretching holds a lengthened position and fits the cool-down. <b>Dynamic</b> stretching moves through a range and fits the warm-up. <b>Ballistic</b> uses bouncing and carries higher risk, reserved for advanced or sport-specific use. <b>PNF</b> (proprioceptive neuromuscular facilitation) pairs contraction and relaxation to gain range and tends to be most effective for improving flexibility.</p>`,
  guide:[
    {h:"Population themes", points:[
      "Screen, start easy, progress slowly, refer medical issues",
      "Older adults: balance and functional strength",
      "Pregnancy: clearance, avoid supine late, avoid overheating",
      "Hypertension: no Valsalva, careful with heavy isometrics",
      "Diabetes: watch for hypoglycemia, keep fuel available",
      "Osteoporosis: weight-bearing, avoid loaded spinal flexion"]},
    {h:"Flexibility", points:[
      "Static for the cool-down",
      "Dynamic for the warm-up",
      "Ballistic is higher risk, advanced use only",
      "PNF is the most effective for range gains"]}
  ],
  highYield:["Dynamic warms up, static cools down.","No Valsalva for hypertensive clients.","Trainers modify and monitor; they do not treat."],
  mnemonic:{name:"Stretch timing", text:"Dynamic to start, static to finish. Ballistic bounces (be careful), PNF for the biggest gains."}
},
{
  id:"professional", code:"D7", name:"Professional Practice & Safety", short:"Professional", icon:"sparkle",
  blurb:"Scope, behavior change, law, and emergencies.",
  summary:`<p>The business and conduct side is heavily tested because it protects clients and trainers alike.</p>
  <h3>Scope and conduct</h3>
  <p>A CPT designs and delivers exercise, coaches technique, and supports healthy habits. Outside the lane: diagnosing, prescribing or adjusting medication, treating injuries or providing rehab, and writing clinical diets. When a client's need falls outside scope, refer to the right professional. A code of conduct covers honesty, confidentiality, and professional boundaries.</p>
  <h3>Behavior change</h3>
  <p>The transtheoretical model describes readiness as stages: precontemplation, contemplation, preparation, action, and maintenance. Matching your approach to the stage beats pushing everyone the same way. Self-efficacy, a person's belief they can succeed, predicts follow-through, and small wins build it. Goals work best when they are SMART: specific, measurable, attainable, relevant, and time-bound. Intrinsic motivation, doing it because it is satisfying, outlasts external rewards.</p>
  <div class="callout"><span class="eyebrow">Legal basics</span>Negligence is failing to meet the standard of care and causing harm. Informed consent tells clients the risks before they agree. Waivers and releases, health-history documentation, confidentiality, and professional liability insurance are the trainer's guardrails.</div>
  <h3>Safety and emergencies</h3>
  <p>Have an emergency action plan and know your role in it. Keep current CPR and AED skills. Recognize warning signs like chest pain, dizziness, or unusual shortness of breath and stop the session. For minor soft-tissue injuries, the classic response is rest, ice, compression, and elevation. Activate emergency services for anything beyond first aid.</p>`,

    {h:"Scope", points:[
      "Design exercise, coach form, support habits",
      "Do not diagnose, prescribe meds, treat injury, or write clinical diets",
      "Refer out when the need exceeds scope"]},
    {h:"Behavior change", points:[
      "TTM stages: precontemplation to maintenance",
      "Build self-efficacy with achievable wins",
      "Set SMART goals",
      "Intrinsic motivation lasts longer than rewards"]},
    {h:"Law & safety", points:[
      "Negligence = failing the standard of care and causing harm",
      "Use informed consent and health-history documentation",

      "Keep an EAP, current CPR/AED, and know the warning signs"]}

  highYield:["Know exactly what is outside CPT scope.","Match your coaching to the client's stage of change.","Negligence, informed consent, and the EAP are recurring items."],
  mnemonic:{name:"Stages of change", text:"'Please Come Prepare And Maintain.' Precontemplation, Contemplation, Preparation, Action, Maintenance."}
}

{term:"One-rep max", domain:"assessment", def:"The most weight a person can lift once with good form; a strength benchmark."},
{term:"Submaximal test", domain:"assessment", def:"A test below all-out effort used to estimate a maximum such as VO2 max."},

{term:"Overload", domain:"programming", def:"Challenging the body beyond its normal demand to force adaptation."},
{term:"Progressive overload", domain:"programming", def:"Gradually increasing the training stimulus over time to keep adapting."},
{term:"SAID principle", domain:"programming", def:"Specific Adaptation to Imposed Demands; you adapt to exactly what you train."},
{term:"Specificity", domain:"programming", def:"Training adaptations are specific to the type of demand placed on the body."},
{term:"Reversibility", domain:"programming", def:"Loss of fitness gains when training stops; use it or lose it."},
{term:"FITT principle", domain:"programming", def:"Frequency, Intensity, Time, and Type, the framework for structuring exercise."},
{term:"Periodization", domain:"programming", def:"Planned variation of training over time to manage adaptation and recovery."},
{term:"Macrocycle", domain:"programming", def:"The largest training block, often about a year."},
{term:"Mesocycle", domain:"programming", def:"A training block of several weeks to months within a macrocycle."},
{term:"Microcycle", domain:"programming", def:"The shortest training block, usually a week."},
{term:"Karvonen method", domain:"programming", def:"Target heart rate from heart-rate reserve: ((HRmax minus HRrest) times intensity) plus HRrest."},
{term:"General adaptation syndrome", domain:"programming", def:"Selye's stress response: alarm, resistance, then exhaustion without recovery."},
{term:"Superset", domain:"programming", def:"Two exercises performed back to back with little or no rest between."},

{term:"Valsalva maneuver", domain:"special", def:"Forced exhalation against a closed airway that spikes blood pressure; risky for hypertensive clients."},
{term:"Static stretching", domain:"special", def:"Holding a lengthened position; best suited to the cool-down."},
{term:"Dynamic stretching", domain:"special", def:"Moving through a range of motion to prepare for activity; best for the warm-up."},
{term:"Ballistic stretching", domain:"special", def:"Using bouncing momentum to stretch; higher risk and for advanced use only."},
{term:"PNF stretching", domain:"special", def:"Proprioceptive neuromuscular facilitation; contract-relax technique that is highly effective for range."},
{term:"Hypoglycemia", domain:"special", def:"Low blood glucose; a risk during exercise for clients using insulin."},

{term:"Scope of practice", domain:"professional", def:"The boundary of services a trainer is qualified and permitted to provide."},
{term:"Transtheoretical model", domain:"professional", def:"Stages-of-change model of readiness, from precontemplation to maintenance."},
{term:"Self-efficacy", domain:"professional", def:"A person's belief in their ability to succeed at a task, which predicts follow-through."},
{term:"SMART goal", domain:"professional", def:"A goal that is Specific, Measurable, Attainable, Relevant, and Time-bound."},
{term:"Negligence", domain:"professional", def:"Failing to meet the standard of care and causing harm as a result."},
{term:"Informed consent", domain:"professional", def:"A client's agreement to participate after being told the risks involved."},
{term:"Standard of care", domain:"professional", def:"The level of skill and caution a reasonably competent trainer would provide."},
{term:"Emergency action plan", domain:"professional", def:"A written plan defining roles and steps for handling an emergency."},
{term:"RICE", domain:"professional", def:"Rest, Ice, Compression, Elevation; first-aid response for minor soft-tissue injury."},
{term:"Intrinsic motivation", domain:"professional", def:"Doing an activity for its own satisfaction; tends to outlast external rewards."}
];

const QUESTIONS = [
{"d":"anatomy","q":"Which energy system is the primary contributor during a maximal 5-second sprint?","c":["Oxidative fat system","Glycolytic lactate system","Phosphagen (ATP-PC) system","Lipolytic fat system"],"a":2,"why":"The phosphagen system uses stored ATP and creatine phosphate to fuel all-out efforts of roughly ten seconds or less, with no oxygen required."},
{"d":"anatomy","q":"During the lowering phase of a biceps curl, the biceps is performing what type of contraction?","c":["Concentric","Eccentric","Isometric","Isokinetic"],"a":1,"why":"The muscle lengthens while still under tension to control the weight against gravity, which is an eccentric contraction."},
{"d":"anatomy","q":"A motor unit consists of:","c":["A single whole muscle and its attaching tendon","One motor neuron and all the fibers it controls","A group of fast-twitch fibers contracting together","The neuromuscular junction and nothing more"],"a":1,"why":"A motor unit is a single motor neuron together with every muscle fiber it innervates."},
{"d":"anatomy","q":"Cardiac output is best described as:","c":["Heart rate times stroke volume","Stroke volume divided by heart rate","Blood pressure times heart rate","The amount of blood per beat"],"a":0,"why":"Cardiac output equals heart rate multiplied by stroke volume, the blood pumped per minute."},
{"d":"anatomy","q":"Which fiber type is most fatigue-resistant and best suited to endurance work?","c":["Type IIx","Type IIa","Type I","Type III"],"a":2,"why":"Type I fibers are slow-twitch, aerobic, and highly fatigue-resistant, making them ideal for endurance."},
{"d":"anatomy","q":"In the sliding filament theory, what is required to release the myosin cross-bridge from actin?","c":["Calcium","ATP","Sodium","Lactate"],"a":1,"why":"ATP binds the myosin head and allows it to detach from actin so the cycle can continue. Calcium exposes the binding site but does not release the bridge."},
{"d":"anatomy","q":"Which muscle acts as the antagonist during elbow flexion?","c":["Biceps brachii","Brachialis","Triceps brachii","Deltoid"],"a":2,"why":"During elbow flexion the triceps opposes the movement, so it is the antagonist."},
{"d":"anatomy","q":"Which hormone is primarily responsible for shuttling glucose from the blood into cells?","c":["Cortisol","Adrenaline","Insulin","Testosterone"],"a":2,"why":"Insulin promotes the uptake of glucose from the bloodstream into cells."},
{"d":"anatomy","q":"The glycolytic energy system predominates during efforts lasting approximately:","c":["0 to 3 seconds","10 seconds to 2 minutes","5 to 10 minutes","Over 30 minutes"],"a":1,"why":"Glycolysis fuels high-intensity efforts from roughly ten seconds up to about two minutes."},
{"d":"anatomy","q":"A muscle that holds a joint steady so the prime mover can act is called a:","c":["Synergist","Agonist","Antagonist","Stabilizer"],"a":3,"why":"A stabilizer, or fixator, steadies a joint or segment so the prime mover can produce the intended movement."},
{"d":"anatomy","q":"Which of the following best explains delayed-onset muscle soreness after a new workout?","c":["Lactic acid pooling in the muscle","Eccentric loading causing tiny muscle damage","Dehydration during the session","Depleted creatine phosphate"],"a":1,"why":"DOMS is largely linked to eccentric actions that cause microtrauma to muscle fibers, not lingering lactic acid."},
{"d":"anatomy","q":"Motor units are generally recruited in what order as force demand rises?","c":["Largest to smallest","Randomly","Smallest to largest","Fast fibers first"],"a":2,"why":"The size principle states that smaller, lower-threshold motor units are recruited first, with larger units added as demand increases."},
{"d":"biomech","q":"A dumbbell lateral raise occurs primarily in which plane of motion?","c":["Sagittal","Frontal","Transverse","Oblique"],"a":1,"why":"Raising the arms out to the sides is abduction, which happens in the frontal plane."},
{"d":"biomech","q":"A standing barbell biceps curl is an example of which lever class?","c":["First class","Second class","Third class","Fourth class"],"a":2,"why":"The effort (biceps) sits between the fulcrum (elbow) and the resistance (weight in the hand), making it a third-class lever."},
{"d":"biomech","q":"Which movement takes place in the sagittal plane?","c":["Arm abduction","Trunk rotation","Knee flexion","Hip adduction"],"a":2,"why":"Knee flexion is a decrease in joint angle occurring in the sagittal plane."},
{"d":"biomech","q":"A standing calf raise is best classified as which lever?","c":["A first-class lever","A second-class lever","A third-class lever","Not a lever"],"a":1,"why":"In a calf raise the resistance (body weight) is between the fulcrum (ball of the foot) and the effort (Achilles pull), a second-class lever."},
{"d":"biomech","q":"Rotational movements such as a cable wood-chop occur primarily in the:","c":["The sagittal plane","The frontal plane","The transverse plane","The coronal plane"],"a":2,"why":"Rotation happens in the transverse plane, which divides the body into top and bottom."},
{"d":"biomech","q":"Torque at a joint increases when:","c":["The lever arm gets shorter","The lever arm gets longer","The muscle relaxes","Body weight decreases"],"a":1,"why":"Torque is force times the length of the lever arm, so a longer lever arm produces more torque for the same force."},
{"d":"biomech","q":"Which axis does motion in the frontal plane rotate around?","c":["The longitudinal axis","Mediolateral axis","Anteroposterior axis","Vertical (up-down) axis"],"a":2,"why":"Frontal-plane motion rotates around the anteroposterior axis, which runs front to back."},
{"d":"biomech","q":"Moving a limb toward the midline of the body is called:","c":["Abduction","Adduction","Extension","Rotation"],"a":1,"why":"Adduction brings a limb toward the body's midline."},
{"d":"biomech","q":"When analyzing a squat's downward phase, the quadriceps are:","c":["Working concentrically to straighten the knee","Working eccentrically to control knee flexion","Holding an isometric contraction throughout","Not really involved in the descent"],"a":1,"why":"On the way down the knees flex while the quads lengthen under load to control the descent, an eccentric action."},
{"d":"biomech","q":"Which lever class is most common in the human body?","c":["First class","Second class","Third class","Equally common"],"a":2,"why":"Third-class levers, with the effort in the middle, dominate the human body and favor speed and range of motion over force."},
{"d":"biomech","q":"Horizontal adduction of the shoulder is the main action in which exercise?","c":["The barbell back squat lift","The dumbbell bench press","The wide-grip lat pulldown","The standing calf raise"],"a":1,"why":"Pressing the arms together across the chest is horizontal adduction, the key action in a bench press."},
{"d":"nutrition","q":"How many kilocalories are in one gram of fat?","c":["4","7","9","2"],"a":2,"why":"Fat provides 9 kcal per gram, more than double carbohydrate or protein."},
{"d":"nutrition","q":"A client wants to lose body fat. The most fundamental requirement is:","c":["Eliminating all carbohydrates","A sustained caloric deficit","Eating only after workouts","Taking a fat-burner supplement"],"a":1,"why":"Fat loss requires expending more energy than is consumed. A sustained caloric deficit is the core requirement."},
{"d":"nutrition","q":"Which macronutrient is the body's preferred fuel for high-intensity exercise?","c":["Dietary fat","Dietary protein","Carbohydrate","Alcohol (ethanol)"],"a":2,"why":"Carbohydrate is the preferred and most efficient fuel for higher-intensity work and refills muscle glycogen."},
{"d":"nutrition","q":"A general daily protein recommendation for an active adult falls around:","c":["0.2 to 0.4 g/kg","1.2 to 2.0 g/kg","3.5 to 4.5 g/kg","0.1 g/kg"],"a":1,"why":"Active people generally need more than the 0.8 g/kg baseline, commonly cited around 1.2 to 2.0 g/kg."},
{"d":"nutrition","q":"The largest component of total daily energy expenditure for most people is:","c":["Exercise activity","The thermic effect","Basal metabolic rate","Daily fidgeting"],"a":2,"why":"Basal metabolic rate, the energy to keep the body running at rest, is usually the biggest slice of daily expenditure."},
{"d":"nutrition","q":"A client asks you to write a detailed meal plan to manage their newly diagnosed diabetes. You should:","c":["Write the plan using an online calculator","Refer them to a registered dietitian","Tell them to just cut sugar","Prescribe a low-carb diet"],"a":1,"why":"Individualized clinical nutrition for a medical condition is outside CPT scope and belongs to a registered dietitian."},
{"d":"nutrition","q":"One gram of alcohol provides how many kilocalories?","c":["4","7","9","0"],"a":1,"why":"Alcohol carries 7 kcal per gram even though it is not an essential nutrient."},
{"d":"nutrition","q":"Glycemic index measures:","c":["The calories in a food","How fast a carbohydrate raises blood sugar","The protein quality of a food","The fat content of a food"],"a":1,"why":"Glycemic index ranks how rapidly a carbohydrate-containing food raises blood sugar."},
{"d":"nutrition","q":"Which statement about hydration and performance is accurate?","c":["Thirst reliably signals hydration","Even mild dehydration can impair performance","Water intake does not matter","Only marathoners need fluids"],"a":1,"why":"Performance declines even with modest dehydration, so fluids should be taken before, during, and after training."},
{"d":"nutrition","q":"A complete protein is one that:","c":["Contains all nine essential amino acids","Contains absolutely no dietary fat at all","Comes only from animal-based sources","Is naturally very high in fiber"],"a":0,"why":"A complete protein supplies all nine essential amino acids in adequate amounts."},
{"d":"nutrition","q":"Which nutrients supply energy (calories)?","c":["Vitamins and minerals by themselves","Carbohydrate, protein, and fat","Water and dietary fiber","Electrolytes and trace minerals"],"a":1,"why":"Only the macronutrients, carbohydrate, protein, and fat, provide energy. Micronutrients do not."},
{"d":"nutrition","q":"For general weight loss, the most durable approach a trainer can support is:","c":["A crash diet for fast results","A modest, sustainable deficit plus activity","Skipping meals most days","Eating one food group"],"a":1,"why":"A moderate, sustainable deficit paired with activity is more maintainable and effective long term than extreme approaches."},
{"d":"assessment","q":"The primary purpose of preparticipation health screening is to:","c":["Sell more training packages","Find who needs medical clearance first","Set the client's goals","Estimate body fat"],"a":1,"why":"Screening flags conditions or risk factors that warrant physician clearance before starting a program."},
{"d":"assessment","q":"Which assessment should generally be performed LAST in a session to avoid skewing results?","c":["Blood pressure","Flexibility","Cardio test","Body fat test"],"a":1,"why":"Flexibility testing goes last so accumulated fatigue from other tests does not distort the results."},
{"d":"assessment","q":"BMI is best described as:","c":["A direct body-fat measurement","A weight-for-height screening ratio","A cardiovascular fitness score","A hydration measure"],"a":1,"why":"BMI compares weight to height as a screening tool and does not directly measure body fat."},
{"d":"assessment","q":"VO2 max is expressed in which units?","c":["Beats/minute","mL/kg/min","mmHg","Kilograms"],"a":1,"why":"VO2 max is reported as milliliters of oxygen per kilogram of body weight per minute."},
{"d":"assessment","q":"The Borg RPE scale traditionally ranges from:","c":["0 to 100","6 to 20","1 to 5","10 to 30"],"a":1,"why":"The classic Borg rating of perceived exertion scale runs from 6 to 20, roughly tracking heart rate in tens."},
{"d":"assessment","q":"A submaximal test is used because it:","c":["It is far more accurate than a maximal test","Estimates a max with less risk and effort","It requires no equipment whatsoever","It only works for well-trained athletes"],"a":1,"why":"Submaximal tests estimate values like VO2 max while reducing the risk and strain of an all-out effort."},
{"d":"assessment","q":"Waist-to-hip ratio is used to assess:","c":["Overall muscular strength level","Fat-distribution health risk","General joint flexibility","Aerobic (cardio) capacity"],"a":1,"why":"The ratio indicates how fat is distributed, which carries its own health risk profile."},
{"d":"assessment","q":"During screening a new client reports chest pain during exertion. The appropriate action is to:","c":["Begin a light workout, watch them","Refer for physician clearance before exercise","Ignore it if they feel fine","Sign a waiver and proceed"],"a":1,"why":"Signs or symptoms such as exertional chest pain require medical clearance before starting exercise."},
{"d":"assessment","q":"A one-rep max test measures:","c":["Muscular endurance capacity","Maximal muscular strength","General joint flexibility","Aerobic fitness level"],"a":1,"why":"The one-rep max is the most weight lifted once with good form, a measure of maximal strength."},
{"d":"assessment","q":"Which is a valid field test for estimating cardiorespiratory fitness?","c":["Sit-and-reach","Rockport walk test","Skinfold caliper test","Handgrip dynamometer"],"a":1,"why":"The Rockport one-mile walk test estimates cardiorespiratory fitness. Sit-and-reach measures flexibility and skinfolds measure body fat."},
{"d":"assessment","q":"Under current guidelines, a resting blood pressure reading is generally considered elevated starting around:","c":["Somewhere around 90 to 100 systolic","120-129 systolic, diastolic under 80","At or above 160 systolic pressure","Anything under 110 systolic pressure"],"a":1,"why":"Current categories flag 120 to 129 over under 80 as elevated. Some older materials use higher cutoffs, so confirm the set your exam uses."},
{"d":"programming","q":"The SAID principle states that the body:","c":["Recovers fully within 24 hours","Adapts to the specific demands imposed","Loses fitness after months","Grows fastest from cardio"],"a":1,"why":"Specific Adaptation to Imposed Demands means adaptations mirror the exact type of training performed."},
{"d":"programming","q":"For maximal strength, the most appropriate loading is roughly:","c":["40 to 50% 1RM for about 20 reps","85%+ 1RM, low reps, long rest","About 60% 1RM for 15 reps","Bodyweight-only movements"],"a":1,"why":"Maximal strength calls for heavy loads at about 85 percent of a one-rep max and above, low reps, and long rest of two to five minutes."},
{"d":"programming","q":"Which rep and load range best targets muscular hypertrophy?","c":["1 to 3 reps at about 95% 1RM","6 to 12 reps at 67 to 85% 1RM","20+ reps at 40% 1RM","Single reps to failure"],"a":1,"why":"Hypertrophy is typically driven by moderate loads for 6 to 12 reps with moderate rest."},
{"d":"programming","q":"The Karvonen formula for target heart rate is:","c":["HRmax multiplied by the intensity percentage","((HRmax minus HRrest) times intensity) plus HRrest","(HRmax minus HRrest) times intensity, nothing added","Simply 220 minus your current age"],"a":1,"why":"Karvonen uses heart-rate reserve: subtract resting from max, multiply by intensity, then add resting heart rate back."},
{"d":"programming","q":"A microcycle most commonly refers to a training block of about:","c":["One year","One month","One week","One day"],"a":2,"why":"A microcycle is the shortest planning unit, usually about a week."},
{"d":"programming","q":"Progressive overload means:","c":["Training to failure each session","Gradually increasing the training stimulus","Keeping weights the same for months","Adding more cardio only"],"a":1,"why":"Progressive overload is the systematic increase of demand so the body keeps adapting."},
{"d":"programming","q":"Which describes undulating periodization?","c":["A steady rise over several months","Varying volume and intensity within a week","No planning at all","Changing exercises yearly"],"a":1,"why":"Undulating periodization varies the training stimulus frequently, often within a single week."},
{"d":"programming","q":"In a well-ordered session, power or explosive work should generally be placed:","c":["At the very end when fatigued","Early, after the warm-up","During the cool-down","It does not matter"],"a":1,"why":"Power and technical work go early while the client is fresh, since fatigue degrades quality and safety."},
{"d":"programming","q":"The 'T' pair in the FITT principle stands for:","c":["Tempo and Total","Time and Type","Tension and Torque","Target and Test"],"a":1,"why":"FITT is Frequency, Intensity, Time, and Type."},
{"d":"programming","q":"General adaptation syndrome describes the sequence:","c":["Alarm, resistance, exhaustion","Warm-up, work, and cool-down","Load, deload, and reload again","Build, peak, and taper down"],"a":0,"why":"Selye's model runs alarm, resistance, and then exhaustion if recovery is inadequate."},
{"d":"programming","q":"Reversibility in training means:","c":["Adaptations are essentially permanent","Fitness declines when training stops","Muscle simply turns into fat","Cardio undoes all strength gains"],"a":1,"why":"Reversibility, or detraining, is the loss of adaptations once the stimulus is removed."},
{"d":"programming","q":"Rest intervals for muscular endurance training are typically:","c":["A full 3 to 5 minutes between sets","Short, around 30 seconds or less","No rest between the sets at all","Exactly two minutes each time"],"a":1,"why":"Muscular endurance uses lighter loads, higher reps, and short rest to build fatigue resistance."},

{"d":"special","q":"For a client with hypertension, which practice should be avoided?","c":["Steady, low-intensity aerobic conditioning","The Valsalva maneuver during heavy lifts","A proper post-workout cool-down","A light dynamic warm-up routine"],"a":1,"why":"The Valsalva maneuver spikes blood pressure, which is risky for hypertensive clients."},

{"d":"special","q":"When training a client with type 2 diabetes who uses insulin, a key concern is:","c":["Overheating and nothing more than that","Hypoglycemia during or after exercise","Consuming far too much protein","Doing a bit too much stretching"],"a":1,"why":"Exercise can lower blood glucose, so hypoglycemia is a real risk, especially with insulin. Keep fuel on hand and monitor."},
{"d":"special","q":"For a pregnant client in the later stages, which is generally advised?","c":["Frequent supine exercises","Avoiding prolonged supine positions","Maximal-effort lifting","Hot-yoga sessions"],"a":1,"why":"Prolonged supine positions are usually avoided later in pregnancy, along with overheating and high fall-risk activity."},
{"d":"special","q":"For a client with osteoporosis, which is the better choice?","c":["Heavy loaded spinal-flexion movements","Weight-bearing work with a neutral spine","No resistance training whatsoever, at all","Ballistic toe-touch stretching"],"a":1,"why":"Weight-bearing loading supports bone, while loaded spinal flexion raises fracture risk and should be avoided."},
{"d":"special","q":"When programming for older adults, a sensible priority is:","c":["Max one-rep testing on day one","Balance, functional strength, slow progression","High-impact plyometrics now","Skipping the warm-up"],"a":1,"why":"Balance, functional strength, and gradual progression reduce fall risk and suit typical needs of older adults."},
{"d":"special","q":"Ballistic stretching is best described as:","c":["A safe default choice for every client","Bouncing movements with higher injury risk","Basically the same thing as static stretching","Something used only during the cool-down"],"a":1,"why":"Ballistic stretching uses momentum and bouncing, which raises injury risk and is reserved for advanced, sport-specific use."},
{"d":"special","q":"Resistance training for youth is:","c":["Far too dangerous to allow","Safe and effective with good coaching","Only for teens over 16","Certain to stunt growth"],"a":1,"why":"With good technique, supervision, and appropriate loads, resistance training is safe and beneficial for young people."},
{"d":"special","q":"The unifying rule across special populations is that the trainer should:","c":["Directly treat the underlying condition","Modify exercise and refer medical issues","Avoid all clients who have any conditions","Adjust the client's medications as needed"],"a":1,"why":"Trainers modify programming and monitor responses; diagnosis and treatment belong to medical professionals."},
{"d":"professional","q":"Which activity clearly falls OUTSIDE a CPT's scope of practice?","c":["Coaching a client's squat technique closely","Prescribing a client's medication dosage","Designing a full strength program","Teaching a dynamic warm-up"],"a":1,"why":"Prescribing or adjusting medication is a medical act well outside a personal trainer's scope."},
{"d":"professional","q":"A client says they are 'thinking about maybe getting in shape someday but not yet.' Which stage of change is this?","c":["Action","Maintenance","Contemplation","Precontemplation"],"a":2,"why":"Weighing the idea without a concrete plan or near-term commitment reflects the contemplation stage."},
{"d":"professional","q":"Negligence in a training context means:","c":["A client not reaching a goal","Failing the standard of care, causing harm","Charging too much money","Missing a session"],"a":1,"why":"Negligence is the failure to provide the expected standard of care, resulting in harm to the client."},
{"d":"professional","q":"Which is a properly formed SMART goal?","c":["Get quite a lot stronger fairly soon","Lose a good amount of body weight","Run a 5K under 30 min within 12 weeks","Just be a much healthier person overall"],"a":2,"why":"It is specific, measurable, and time-bound, unlike the vague alternatives."},
{"d":"professional","q":"Informed consent primarily ensures that a client:","c":["Pays before any training","Knows the risks before agreeing to participate","Signs up for a package","Is cleared for competition"],"a":1,"why":"Informed consent documents that the client was told the risks of participation and agreed to proceed."},
{"d":"professional","q":"For a minor soft-tissue injury like a mild ankle sprain, the classic first-aid approach is:","c":["Immediate heat and vigorous deep massage","RICE: rest, ice, compression, elevation","Keep training right through the pain","Stretch it out aggressively"],"a":1,"why":"RICE, rest, ice, compression, and elevation, is the standard early response for minor soft-tissue injuries."},
{"d":"professional","q":"Self-efficacy is best defined as:","c":["A client's overall household income level","Belief in one's ability to succeed at a task","The trainer's professional certification level","One particular category of fitness goal"],"a":1,"why":"Self-efficacy is confidence in one's ability to perform a behavior, and it strongly predicts adherence."},
{"d":"professional","q":"An emergency action plan should:","c":["Be memorized by every client","Define staff roles and steps for emergencies","Exist only in large commercial gyms","Completely replace CPR certification training"],"a":1,"why":"An EAP spells out who does what and the sequence of actions when an emergency occurs."},
{"d":"professional","q":"Why should a trainer carry professional liability insurance?","c":["It is legally the same thing as CPR","It covers claims arising from their services","It guarantees a steady stream of new clients","It is only required for gym owners"],"a":1,"why":"Liability insurance protects the trainer financially against claims related to the services they provide."},
{"d":"professional","q":"A client in the 'action' stage is best supported by:","c":["Convincing them that exercise is worthwhile now","Reinforcing the behavior and solving barriers","Waiting until they feel truly ready","Ignoring the progress they have made"],"a":1,"why":"In the action stage the client is already doing the behavior, so support focuses on reinforcement and removing obstacles."},
{"d":"professional","q":"Which is the strongest example of staying within scope while helping with nutrition?","c":["Prescribing a 1,600-calorie diabetic meal plan","Sharing general healthy-eating guidelines","Recommending prescription supplements","Diagnosing a vitamin deficiency"],"a":1,"why":"General guidance is within scope; individualized clinical plans, prescriptions, and diagnoses are not."},
{"d":"professional","q":"During a session a client becomes pale, clutches their chest, and is short of breath. You should first:","c":["Offer water and keep training at a lighter pace","Stop and activate the emergency action plan","Have them stretch it out and continue","Wait a while to see if it passes"],"a":1,"why":"These are warning signs of a serious event. Stop immediately and activate emergency procedures, including calling for help."},

{"d":"anatomy","q":"The neurotransmitter released at the neuromuscular junction to trigger contraction is:","c":["Dopamine","Insulin","Acetylcholine","Cortisol"],"a":2,"why":"Acetylcholine is released at the neuromuscular junction and starts the events that lead to a muscle contraction."},
{"d":"anatomy","q":"Which system rapidly regenerates ATP using creatine phosphate?","c":["Oxidative","Phosphagen","Glycolytic","Aerobic system"],"a":1,"why":"The phosphagen (ATP-PC) system uses stored creatine phosphate to resynthesize ATP almost instantly for short, powerful efforts."},
{"d":"anatomy","q":"The basic contractile unit of a muscle is the:","c":["Sarcomere","Fascicle","Motor unit","Tendon"],"a":0,"why":"The sarcomere, the repeating actin-and-myosin unit, is where the sliding filament action produces force."},
